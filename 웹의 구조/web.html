# HyperText Markup Language
<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>브라우저 상단 타이틀</title>
    </head>
    <body>
        #gnb a : 아이디가 gnb객체의 후손(하위레벨) a태그를 잡아라
        #gnb .menu1 a : 아이디가 gnb객체의 후손(하위레벨) 클래스가 menu1인 후손(하위레벨) a 잡아라
        #gnb .naver a : 메뉴3이 잡힌다
        <ul id="gnb">
            <li classs = "menu1"><a href="">메뉴1</a></li>
            <li><a href="">메뉴2</a></li>
            <li class = "naver"><a href="">메뉴3</a></li>
            <li><a href="">메뉴4</a></li>
            <li><a href="">메뉴5</a></li>
        </ul>
    </body>
</html>
